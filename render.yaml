databases:
  - name: pt-edge-db
    plan: basic-1gb
    databaseName: pt_edge
    user: pt_edge_user

  - name: umami-db
    plan: basic-256mb
    databaseName: umami
    user: umami_user
    region: oregon

services:
  - type: web
    name: pt-edge
    plan: standard
    runtime: docker
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pt-edge-db
          property: connectionString
      - key: API_TOKEN
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: pt-edge-umami
    plan: starter
    runtime: image
    image:
      url: ghcr.io/umami-software/umami:postgresql-latest
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umami-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: TRACKER_SCRIPT_NAME
        value: pte.js
      - key: COLLECT_API_ENDPOINT
        value: /api/collect
      - key: REMOVE_TRAILING_SLASH
        value: "1"
      - key: CLIENT_IP_HEADER
        value: X-Forwarded-For
      - key: DISABLE_TELEMETRY
        value: "1"

  - type: worker
    name: pt-edge-daily-ingest-worker
    runtime: docker
    region: oregon
    plan: standard
    autoDeploy: false
    dockerCommand: python scripts/ingest_worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pt-edge-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: UMAMI_DATABASE_URL
        sync: false
      - key: UMAMI_WEBSITE_ID
        sync: false

  # Saturday and Sunday cron jobs removed — all work now handled by
  # the task queue worker (discover_ai_repos and compute_structural
  # are scheduled based on staleness, not day of week).
