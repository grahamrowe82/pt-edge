databases:
  - name: pt-edge-db
    plan: basic-256mb
    databaseName: pt_edge
    user: pt_edge_user

services:
  - type: web
    name: pt-edge
    plan: starter
    runtime: docker
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pt-edge-db
          property: connectionString
      - key: API_TOKEN
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: pt-edge-ingest
    runtime: docker
    region: oregon
    schedule: "0 6 * * *"
    dockerCommand: python scripts/ingest_all.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pt-edge-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false

  - type: cron
    name: pt-edge-ai-repos-weekly
    runtime: docker
    region: oregon
    schedule: "0 12 * * 6"
    dockerCommand: python scripts/ingest_ai_repos.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pt-edge-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
